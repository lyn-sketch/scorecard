<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scorecard — Jun–Dec 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f9f8f6;
    --surface: #ffffff;
    --border: #e4e2dc;
    --border-light: #f0ede8;
    --text: #1a1916;
    --text-muted: #6b6860;
    --text-hint: #a8a59e;
    --accent: #EA580C;
    --accent-light: #fff4ee;
    --green-bg: #f0fdf4;
    --green-text: #166534;
    --red-bg: #fef2f2;
    --red-text: #991b1b;
    --amber-bg: #fffbeb;
    --amber-text: #92400e;
    --radius: 10px;
    --radius-sm: 6px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 32px 24px;
  }

  .page-header {
    max-width: 1400px;
    margin: 0 auto 28px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .page-title { font-size: 26px; font-weight: 600; letter-spacing: -0.3px; }
  .page-sub { font-size: 13px; color: var(--text-muted); margin-top: 3px; }

  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: background 0.15s, border-color 0.15s;
  }
  .btn:hover { background: var(--bg); }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: #c2410c; border-color: #c2410c; }

  .card {
    max-width: 1400px;
    margin: 0 auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .card-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border-light);
    background: #faf9f7;
    flex-wrap: wrap;
    gap: 10px;
  }

  .filters { display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-chip {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    cursor: pointer;
  }
  .filter-chip:hover { border-color: var(--accent); color: var(--accent); }

  .table-scroll { overflow-x: auto; }

  table { width: 100%; border-collapse: collapse; min-width: 900px; }

  thead .month-row th {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-align: center;
    padding: 8px 6px 6px;
    background: #f5f3f0;
    border-bottom: 1px solid var(--border-light);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  thead .month-row th:first-child { text-align: left; border-right: 1px solid var(--border); }

  thead .week-row th {
    font-size: 10px;
    font-weight: 500;
    color: var(--text-hint);
    padding: 6px 6px;
    text-align: right;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    background: var(--surface);
  }
  thead .week-row th.col-fixed { text-align: left; font-size: 11px; color: var(--text-muted); }
  thead .week-row th.col-sep { border-right: 1px solid var(--border); }

  tbody tr { transition: background 0.1s; }
  tbody tr:hover td { background: #faf9f7; }
  tbody tr:last-child td { border-bottom: none; }

  td {
    font-size: 12px;
    padding: 9px 8px;
    border-bottom: 1px solid var(--border-light);
    vertical-align: middle;
    color: var(--text);
  }
  td.col-sep { border-right: 1px solid var(--border); }
  td.num { text-align: right; font-family: 'DM Mono', monospace; font-size: 11px; }
  td.title-cell { font-weight: 500; font-size: 13px; white-space: nowrap; max-width: 200px; overflow: hidden; text-overflow: ellipsis; }
  td.goal-cell { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
  td.stat-cell { font-family: 'DM Mono', monospace; font-size: 11px; text-align: right; color: var(--text-muted); }

  td.week-cell {
    text-align: right;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    min-width: 64px;
    transition: background 0.1s;
  }
  td.week-cell:hover { background: #f0ede8 !important; }
  td.cell-green { background: var(--green-bg); color: var(--green-text); }
  td.cell-red { background: var(--red-bg); color: var(--red-text); }
  td.cell-empty { color: var(--text-hint); }

  .status-dot {
    width: 22px; height: 22px;
    border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600;
  }
  .s-ok { background: var(--green-bg); color: var(--green-text); }
  .s-bad { background: var(--red-bg); color: var(--red-text); }
  .s-warn { background: var(--amber-bg); color: var(--amber-text); }
  .s-none { background: #f0ede8; color: var(--text-hint); }

  .group-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 11px 20px;
    background: #f5f3f0;
    border-bottom: 1px solid var(--border);
  }
  .group-label { font-size: 14px; font-weight: 600; }
  .group-count { font-weight: 400; color: var(--text-muted); margin-left: 6px; }

  .del-btn {
    font-size: 12px; padding: 3px 8px;
    border: none; background: transparent;
    color: var(--text-hint); cursor: pointer;
    border-radius: 4px; opacity: 0;
    transition: opacity 0.15s, color 0.15s;
  }
  tr:hover .del-btn { opacity: 1; }
  .del-btn:hover { color: var(--red-text); background: var(--red-bg); }

  /* Modal */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.35);
    display: flex; align-items: center; justify-content: center;
    z-index: 200; backdrop-filter: blur(2px);
  }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    width: 380px; max-width: 95vw;
    box-shadow: 0 8px 32px rgba(0,0,0,0.1);
  }
  .modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
  .modal label { font-size: 12px; color: var(--text-muted); display: block; margin-top: 12px; margin-bottom: 4px; }
  .modal input, .modal select {
    width: 100%; font-family: 'DM Sans', sans-serif;
    font-size: 13px; padding: 8px 10px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--surface); color: var(--text);
    outline: none;
  }
  .modal input:focus, .modal select:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

  .save-bar {
    position: fixed; bottom: 20px; right: 24px;
    display: flex; gap: 8px;
  }

  /* Tabs */
  .tabs { display: flex; border-bottom: 1px solid var(--border-light); padding: 0 20px; }
  .tab { font-size: 13px; padding: 10px 14px; cursor: pointer; color: var(--text-muted); border-bottom: 2px solid transparent; margin-bottom: -1px; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }
</style>
</head>
<body>

<div class="page-header">
  <div>
    <div class="page-title">Scorecard</div>
    <div class="page-sub">Record and evaluate key metrics — June 2026 to December 2026</div>
  </div>
  <button class="btn btn-primary" onclick="openAddModal()">+ New measurable</button>
</div>

<div class="card">
  <div class="tabs">
    <div class="tab">Trends</div>
    <div class="tab active">Weekly</div>
    <div class="tab">Monthly</div>
    <div class="tab">Quarterly</div>
    <div class="tab">Annual</div>
  </div>

  <div class="card-toolbar">
    <div class="filters">
      <button class="filter-chip">Team: Leadership Team ▾</button>
      <button class="filter-chip">View by: Week ▾</button>
      <button class="filter-chip">Jun – Dec 2026 ▾</button>
    </div>
    <button class="btn" onclick="exportCSV()">↓ Export CSV</button>
  </div>

  <div class="group-bar">
    <span class="group-label">Weekly <span class="group-count" id="row-count"></span></span>
    <button class="btn" style="font-size:12px;padding:5px 12px" onclick="openAddModal()">+ Add row</button>
  </div>

  <div class="table-scroll">
    <table id="sc-table">
      <thead>
        <tr class="month-row" id="month-row"></tr>
        <tr class="week-row" id="week-row"></tr>
      </thead>
      <tbody id="sc-body"></tbody>
    </table>
  </div>
</div>

<!-- Add modal -->
<div class="overlay" id="add-modal" style="display:none">
  <div class="modal">
    <h3>Add measurable</h3>
    <label>Title</label>
    <input id="m-title" type="text" placeholder="e.g. Meetings with Leads">
    <label>Goal type</label>
    <select id="m-goal-type">
      <option value="gte">>= (at least)</option>
      <option value="lte"><= (at most)</option>
      <option value="eq">= (exactly)</option>
      <option value="bool">Yes / No</option>
    </select>
    <label>Goal value</label>
    <input id="m-goal-val" type="text" placeholder="e.g. 5 or $1000">
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('add-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveRow()">Save</button>
    </div>
  </div>
</div>

<!-- Edit cell modal -->
<div class="overlay" id="edit-modal" style="display:none">
  <div class="modal">
    <h3>Enter value</h3>
    <label id="ec-label">Value</label>
    <input id="ec-input" type="text" placeholder="">
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('edit-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveCell()">Save</button>
    </div>
  </div>
</div>

<script>
// ── Week generation: Mon Jun 1 → Mon Dec 28, 2026 ──
function buildWeeks() {
  const weeks = [];
  const d = new Date(2026, 5, 1);
  const dow = d.getDay();
  d.setDate(d.getDate() + (dow === 1 ? 0 : dow === 0 ? 1 : 8 - dow));
  const end = new Date(2026, 11, 31);
  const MO = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  while (d <= end) {
    weeks.push({ label: MO[d.getMonth()] + " " + d.getDate(), month: d.getMonth() });
    d.setDate(d.getDate() + 7);
  }
  return weeks;
}
const WEEKS = buildWeeks();

// ── Data ──
let rows = [
  { id:1, title:"Meetings with Leads",           goalType:"gte", goalVal:"2",    isMoney:false, values:{} },
  { id:2, title:"All Posts Published On Time",   goalType:"bool",goalVal:"Yes",  isMoney:false, values:{} },
  { id:3, title:"Amount Invoiced This Week",      goalType:"gte", goalVal:"5769", isMoney:true,  values:{} },
  { id:4, title:"Video Output",                   goalType:"gte", goalVal:"15",   isMoney:false, values:{} },
  { id:5, title:"Shoots Planned",                 goalType:"gte", goalVal:"3",    isMoney:false, values:{} },
  { id:6, title:"Creative Stress",                goalType:"lte", goalVal:"3",    isMoney:false, values:{} },
];
let nextId = 7;
let _editRow = null, _editWk = null;

// Persist to localStorage
function save() { try { localStorage.setItem('sc_rows', JSON.stringify(rows)); localStorage.setItem('sc_nextId', nextId); } catch(e){} }
function load() {
  try {
    const r = localStorage.getItem('sc_rows');
    const n = localStorage.getItem('sc_nextId');
    if (r) rows = JSON.parse(r);
    if (n) nextId = parseInt(n);
  } catch(e) {}
}

// ── Logic ──
function meetsGoal(row, val) {
  if (val === null || val === undefined || val === "") return null;
  if (row.goalType === "bool") return val === "Yes";
  const n = parseFloat(String(val).replace(/[$,]/g, ""));
  const g = parseFloat(String(row.goalVal).replace(/[$,]/g, ""));
  if (isNaN(n) || isNaN(g)) return null;
  if (row.goalType === "gte") return n >= g;
  if (row.goalType === "lte") return n <= g;
  if (row.goalType === "eq")  return n === g;
  return null;
}

function fmt(row, val) {
  if (val === null || val === undefined || val === "") return "";
  if (row.goalType === "bool") return val;
  const n = parseFloat(String(val).replace(/[$,]/g, ""));
  if (isNaN(n)) return val;
  if (row.isMoney) return "$" + n.toLocaleString();
  return Number.isInteger(n) ? n : parseFloat(n.toFixed(2));
}

function calcStats(row) {
  const vals = WEEKS.map((_, i) => row.values[i]).filter(v => v !== null && v !== undefined && v !== "");
  if (!vals.length) return { avg: "—", total: "—" };
  if (row.goalType === "bool") {
    const y = vals.filter(v => v === "Yes").length;
    return { avg: Math.round(y / vals.length * 100) + "%", total: y + "/" + vals.length };
  }
  const nums = vals.map(v => parseFloat(String(v).replace(/[$,]/g,""))).filter(n => !isNaN(n));
  if (!nums.length) return { avg: "—", total: "—" };
  const tot = nums.reduce((a, b) => a + b, 0);
  const avg = tot / nums.length;
  const f = v => row.isMoney ? "$" + Math.round(v).toLocaleString() : (Number.isInteger(v) ? v : parseFloat(v.toFixed(2)));
  return { avg: f(avg), total: f(tot) };
}

function statusIcon(row) {
  const recent = WEEKS.slice(0, 4).map((_, i) => row.values[i]).filter(v => v !== null && v !== undefined && v !== "");
  if (!recent.length) return `<span class="status-dot s-none">?</span>`;
  const ok = recent.filter(v => meetsGoal(row, v) === true).length;
  if (ok === recent.length) return `<span class="status-dot s-ok">✓</span>`;
  if (ok === 0) return `<span class="status-dot s-bad">!</span>`;
  return `<span class="status-dot s-warn">△</span>`;
}

function goalLabel(row) {
  const sym = row.goalType === "gte" ? ">= " : row.goalType === "lte" ? "<= " : row.goalType === "eq" ? "= " : "";
  const v = row.isMoney ? "$" + parseFloat(row.goalVal).toLocaleString() : row.goalVal;
  return sym + v;
}

// ── Render ──
function buildHeaders() {
  const MO = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const monthRow = document.getElementById("month-row");
  const weekRow = document.getElementById("week-row");

  // Month row
  let spans = [], lastM = -1, span = 0;
  WEEKS.forEach(w => {
    if (w.month !== lastM) { if (lastM !== -1) spans.push({ m: lastM, n: span }); lastM = w.month; span = 1; }
    else span++;
  });
  if (lastM !== -1) spans.push({ m: lastM, n: span });

  monthRow.innerHTML = `<th colspan="5" class="col-fixed col-sep" style="text-align:left;font-size:11px;color:var(--text-muted)"></th>`;
  spans.forEach(s => {
    monthRow.innerHTML += `<th colspan="${s.n}" style="border-left:1px solid var(--border-light)">${MO[s.m]} 2026</th>`;
  });
  monthRow.innerHTML += `<th style="width:40px"></th>`;

  // Week row
  weekRow.innerHTML = `
    <th class="col-fixed" style="width:32px"></th>
    <th class="col-fixed">Title</th>
    <th class="col-fixed">Goal</th>
    <th class="col-fixed" style="text-align:right">Avg</th>
    <th class="col-fixed col-sep" style="text-align:right">Total</th>
  `;
  WEEKS.forEach(w => {
    weekRow.innerHTML += `<th style="text-align:right;border-left:0 solid transparent">${w.label}</th>`;
  });
  weekRow.innerHTML += `<th style="width:40px"></th>`;
}

function render() {
  buildHeaders();
  const tbody = document.getElementById("sc-body");
  tbody.innerHTML = "";
  rows.forEach(row => {
    const { avg, total } = calcStats(row);
    const tr = document.createElement("tr");
    let html = `
      <td>${statusIcon(row)}</td>
      <td class="title-cell">${row.title}</td>
      <td class="goal-cell">${goalLabel(row)}</td>
      <td class="stat-cell">${avg}</td>
      <td class="stat-cell col-sep">${total}</td>
    `;
    WEEKS.forEach((_, i) => {
      const val = row.values[i];
      const ok = meetsGoal(row, val);
      const cls = ok === true ? "cell-green" : ok === false ? "cell-red" : "cell-empty";
      const disp = fmt(row, val);
      html += `<td class="week-cell ${cls}" onclick="openEditCell(${row.id},${i})">${disp || '<span style="opacity:0.25">·</span>'}</td>`;
    });
    html += `<td><button class="del-btn" onclick="deleteRow(${row.id})">✕</button></td>`;
    tr.innerHTML = html;
    tbody.appendChild(tr);
  });
  document.getElementById("row-count").textContent = `(${rows.length})`;
}

// ── Modals ──
function openAddModal() {
  document.getElementById("m-title").value = "";
  document.getElementById("m-goal-type").value = "gte";
  document.getElementById("m-goal-val").value = "";
  document.getElementById("add-modal").style.display = "flex";
  setTimeout(() => document.getElementById("m-title").focus(), 80);
}
function closeModal(id) { document.getElementById(id).style.display = "none"; }

function saveRow() {
  const title = document.getElementById("m-title").value.trim();
  if (!title) return;
  const goalType = document.getElementById("m-goal-type").value;
  const rawVal = document.getElementById("m-goal-val").value.trim() || "0";
  const isMoney = rawVal.startsWith("$");
  rows.push({ id: nextId++, title, goalType, goalVal: rawVal.replace("$",""), isMoney, values: {} });
  closeModal("add-modal"); save(); render();
}

function openEditCell(rowId, wkIdx) {
  _editRow = rowId; _editWk = wkIdx;
  const row = rows.find(r => r.id === rowId);
  document.getElementById("ec-label").textContent = `"${row.title}" — ${WEEKS[wkIdx].label}`;
  const cur = row.values[wkIdx];
  document.getElementById("ec-input").value = (cur === null || cur === undefined) ? "" : cur;
  document.getElementById("ec-input").placeholder = row.goalType === "bool" ? "Yes or No" : row.isMoney ? "e.g. 5000" : "e.g. 3";
  document.getElementById("edit-modal").style.display = "flex";
  setTimeout(() => document.getElementById("ec-input").focus(), 80);
}

function saveCell() {
  const row = rows.find(r => r.id === _editRow);
  let v = document.getElementById("ec-input").value.trim();
  if (v === "") v = null;
  else if (row.goalType !== "bool") { const n = parseFloat(v.replace(/[$,]/g,"")); if (!isNaN(n)) v = n; }
  row.values[_editWk] = v;
  closeModal("edit-modal"); save(); render();
}

function deleteRow(id) { rows = rows.filter(r => r.id !== id); save(); render(); }

// ── CSV Export ──
function exportCSV() {
  const MO = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const headers = ["Title","Goal","Average","Total", ...WEEKS.map(w => w.label + " " + 2026)];
  const lines = [headers.join(",")];
  rows.forEach(row => {
    const { avg, total } = calcStats(row);
    const cells = [
      `"${row.title}"`,
      goalLabel(row),
      avg, total,
      ...WEEKS.map((_, i) => { const v = row.values[i]; return v === null || v === undefined ? "" : v; })
    ];
    lines.push(cells.join(","));
  });
  const blob = new Blob([lines.join("\n")], { type: "text/csv" });
  const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
  a.download = "scorecard_jun_dec_2026.csv"; a.click();
}

// ── Keyboard shortcuts ──
document.addEventListener("keydown", e => {
  if (e.key === "Escape") { closeModal("add-modal"); closeModal("edit-modal"); }
});
document.getElementById("ec-input").addEventListener("keydown", e => { if (e.key === "Enter") saveCell(); });
document.getElementById("m-title").addEventListener("keydown", e => { if (e.key === "Enter") saveRow(); });

// ── Init ──
load();
render();
</script>
</body>
</html>
